# =============================================================================
# DEPLOY AUTOMATICO - CLOUDFLARE PAGES
# =============================================================================
#
# COMO USAR:
#   1. Commit suas mudancas: git add -A && git commit -m "feat: ..."
#   2. Push pro master: git push origin master
#   3. Crie a tag: git tag site-v1.0.0
#   4. Push da tag: git push origin site-v1.0.0
#   5. Acompanhe em: https://github.com/iagentes-dev/site-iagentes/actions
#
# CUIDADO:
#   - Tag criada = Deploy automatico = Em producao!
#   - Sempre teste local (npm run dev) antes de criar tag
#   - Use versoes incrementais (v1.0.0 -> v1.0.1 -> v1.1.0)
#
# SECRETS NECESSARIOS:
#   - CLOUDFLARE_API_TOKEN
#   - CLOUDFLARE_ACCOUNT_ID
#
# PRODUCAO: https://site-iagentes.pages.dev (via Cloudflare Pages)
# =============================================================================

name: Deploy to Cloudflare Pages

on:
  push:
    tags:
      - 'site-v*.*.*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=site-iagentes --branch=master
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
